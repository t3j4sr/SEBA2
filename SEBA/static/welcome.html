<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S.E.B.A – Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:#09090b;
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }

    /* ── subtle radial glow ─────────────────── */
    .glow{
      position:fixed;inset:0;pointer-events:none;
      background:radial-gradient(55% 40% at 50% 55%,rgba(99,102,241,.13),transparent 70%);
    }

    /* ── content wrapper ───────────────────── */
    .content{
      display:flex;flex-direction:column;align-items:center;gap:2.5rem;
      animation:fadeIn .6s ease forwards;
      position:relative;z-index:10;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* ── brand ─────────────────────────────── */
    .brand{
      font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
      color:rgba(255,255,255,.3);
    }

    /* ── greeting ──────────────────────────── */
    .greeting{
      text-align:center;
    }
    .greeting .hello{
      font-size:clamp(1.4rem,4vw,2rem);font-weight:700;
      color:rgba(255,255,255,.9);
    }
    .greeting .username{
      font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;
      background:linear-gradient(135deg,#fff 30%,#a5b4fc);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }

    /* ── orbital ring loader ─────────────────── */
    .loader-wrap{
      width:140px;height:140px;
      display:flex;align-items:center;justify-content:center;
      position:relative;
    }

    /* glowing core dot */
    .orbit-core{
      width:14px;height:14px;border-radius:50%;
      background:#6366f1;
      box-shadow:0 0 18px 6px rgba(99,102,241,.55),0 0 40px 12px rgba(99,102,241,.2);
      position:absolute;z-index:2;
      animation:corePulse 2s ease-in-out infinite;
    }
    @keyframes corePulse{
      0%,100%{transform:scale(1);box-shadow:0 0 18px 6px rgba(99,102,241,.55),0 0 40px 12px rgba(99,102,241,.2);}
      50%{transform:scale(1.25);box-shadow:0 0 28px 10px rgba(99,102,241,.7),0 0 60px 20px rgba(99,102,241,.3);}
    }

    /* shared ring style */
    .ring{
      position:absolute;border-radius:50%;
      border:2px solid transparent;
    }
    /* ring 1 — largest, slow */
    .ring1{
      width:130px;height:130px;
      border-top-color:#6366f1;
      border-right-color:rgba(99,102,241,.15);
      animation:spin1 2.2s linear infinite;
    }
    /* ring 2 — medium, opposite direction */
    .ring2{
      width:96px;height:96px;
      border-bottom-color:#a5b4fc;
      border-left-color:rgba(165,180,252,.15);
      animation:spin2 1.6s linear infinite;
    }
    /* ring 3 — smallest, fast, tilted */
    .ring3{
      width:62px;height:62px;
      border-top-color:rgba(255,255,255,.7);
      border-right-color:rgba(255,255,255,.08);
      animation:spin3 1s linear infinite;
      transform:rotate(45deg);
    }

    /* orbiting dot on ring1 */
    .ring1::after{
      content:'';position:absolute;top:-4px;left:50%;margin-left:-4px;
      width:8px;height:8px;border-radius:50%;
      background:#6366f1;
      box-shadow:0 0 8px 3px rgba(99,102,241,.8);
    }
    /* orbiting dot on ring2 */
    .ring2::before{
      content:'';position:absolute;bottom:-4px;left:50%;margin-left:-4px;
      width:6px;height:6px;border-radius:50%;
      background:#a5b4fc;
      box-shadow:0 0 6px 2px rgba(165,180,252,.8);
    }

    @keyframes spin1{to{transform:rotate(360deg)}}
    @keyframes spin2{to{transform:rotate(-360deg)}}
    @keyframes spin3{to{transform:rotate(calc(45deg + 360deg));}}

    /* ── status text ────────────────────────── */
    .status{
      font-size:.82rem;letter-spacing:.08em;
      color:rgba(255,255,255,.3);
      animation:pulse 2s ease infinite;
    }
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}

    /* ── progress bar ───────────────────────── */
    .progress-track{
      width:180px;height:2px;
      background:rgba(255,255,255,.07);
      border-radius:99px;overflow:hidden;
    }
    .progress-bar{
      height:100%;width:0;
      background:linear-gradient(90deg,#6366f1,#a5b4fc);
      border-radius:99px;
      transition:width .1s linear;
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="content">
  <div class="brand">S·E·B·A</div>

  <div class="greeting">
    <div class="hello">Welcome back,</div>
    <div class="username" id="usernameDisplay">—</div>
  </div>

  <!-- Orbital ring loader -->
  <div class="loader-wrap">
    <div class="orbit-core"></div>
    <div class="ring ring3"></div>
    <div class="ring ring2"></div>
    <div class="ring ring1"></div>
  </div>

  <div class="progress-track">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status" id="statusText">Setting up your dashboard…</div>
</div>

<script>
  /* ── Read session ───────────────────────────── */
  let username = 'there';
  try {
    const s = JSON.parse(localStorage.getItem('sebaUser') || '{}');
    if (s.username) username = s.username.charAt(0).toUpperCase() + s.username.slice(1);
    if (!s.user_id) { location.href = '/login'; }
  } catch(e) { location.href = '/login'; }

  document.getElementById('usernameDisplay').textContent = username;

  /* ── Progress + redirect ────────────────────── */
  const DURATION = 3500; // ms
  const bar = document.getElementById('progressBar');
  const statusEl = document.getElementById('statusText');
  const messages = [
    'Fetching your transactions…',
    'Analysing spending patterns…',
    'Loading your dashboard…',
    'Almost ready…'
  ];
  let start = null;

  function step(ts) {
    if (!start) start = ts;
    const elapsed = ts - start;
    const pct = Math.min((elapsed / DURATION) * 100, 100);
    bar.style.width = pct + '%';

    // cycle status messages
    const idx = Math.floor((elapsed / DURATION) * messages.length);
    statusEl.textContent = messages[Math.min(idx, messages.length - 1)];

    if (elapsed < DURATION) {
      requestAnimationFrame(step);
    } else {
      location.href = '/home';
    }
  }
  requestAnimationFrame(step);
</script>

</body>
</html>
