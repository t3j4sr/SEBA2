<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S.E.B.A – Smart Expense Behaviour Analyser</title>
  <meta name="description" content="S.E.B.A. — AI-powered personal finance coach. Track spending, predict patterns, and grow your wealth."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Inter',system-ui,sans-serif;background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}

    /* ── hero ──────────────────────────────────────────── */
    .hero{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;width:100%;padding:2rem;
      animation:fadeUp .9s cubic-bezier(.22,.61,.36,1) forwards;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

    /* ── badge ─────────────────────────────────────────── */
    .badge{
      display:inline-flex;align-items:center;gap:.45rem;
      padding:.32rem 1rem;
      background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.22);
      border-radius:99px;font-size:.7rem;font-weight:600;
      color:#a5b4fc;letter-spacing:.06em;text-transform:uppercase;
      margin-bottom:1.6rem;position:relative;z-index:20;
    }
    .badge-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

    /* ── title ─────────────────────────────────────────── */
    .title{
      font-size:clamp(4.5rem,13vw,9.5rem);font-weight:900;
      letter-spacing:-.03em;color:#fff;text-align:center;
      line-height:1;position:relative;z-index:20;
    }

    /* ── sparkles container ─────────────────────────────── */
    .sparkles-wrap{
      position:relative;
      width:min(640px,92vw);height:180px;
      margin-top:-8px;
    }
    /* gradient accent lines */
    .gl{position:absolute;top:0;z-index:2}
    .gl1{left:80px;right:80px;height:2px;background:linear-gradient(90deg,transparent,#6366f1,transparent);filter:blur(1px)}
    .gl2{left:80px;right:80px;height:1px;background:linear-gradient(90deg,transparent,#6366f1,transparent)}
    .gl3{left:200px;right:200px;height:5px;background:linear-gradient(90deg,transparent,#38bdf8,transparent);filter:blur(2px)}
    .gl4{left:200px;right:200px;height:1px;background:linear-gradient(90deg,transparent,#38bdf8,transparent)}
    /* canvas */
    #sparklesCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:1}
    /* radial mask — hides sharp edges */
    .sparkles-mask{
      position:absolute;inset:0;z-index:3;background:#000;
      -webkit-mask-image:radial-gradient(360px 180px at top,transparent 20%,black);
      mask-image:radial-gradient(360px 180px at top,transparent 20%,black);
    }

    /* ── subtitle ──────────────────────────────────────── */
    .subtitle{
      font-size:clamp(.82rem,1.6vw,1rem);color:rgba(255,255,255,.4);
      letter-spacing:.12em;text-transform:uppercase;text-align:center;
      margin-top:.4rem;position:relative;z-index:20;
    }

    /* ── CTA buttons ────────────────────────────────────── */
    .cta-group{display:flex;gap:.9rem;margin-top:2.8rem;z-index:20;position:relative;}
    .btn-primary{
      padding:.85rem 2.4rem;background:#fff;color:#09090b;
      border:none;border-radius:12px;font-family:inherit;
      font-size:.95rem;font-weight:700;cursor:pointer;
      text-decoration:none;transition:background .2s,transform .15s,box-shadow .2s;
      display:inline-flex;align-items:center;gap:.45rem;
      box-shadow:0 4px 24px rgba(255,255,255,.12);
    }
    .btn-primary:hover{background:#e4e4e7;transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,255,255,.18)}
    .btn-ghost{
      padding:.85rem 2rem;background:transparent;
      color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1);
      border-radius:12px;font-family:inherit;font-size:.95rem;
      font-weight:500;cursor:pointer;text-decoration:none;
      transition:all .2s;display:inline-flex;align-items:center;gap:.45rem;
    }
    .btn-ghost:hover{border-color:rgba(255,255,255,.3);color:#fff}

    /* ── feature pills ──────────────────────────────────── */
    .pills{
      display:flex;flex-wrap:wrap;justify-content:center;gap:.55rem;
      margin-top:2.4rem;z-index:20;position:relative;max-width:520px;
    }
    .pill{
      padding:.28rem .85rem;border-radius:99px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
      font-size:.7rem;color:rgba(255,255,255,.4);font-weight:500;
    }

    /* ── subtle vignette glow ───────────────────────────── */
    .glow{
      position:fixed;inset:0;pointer-events:none;
      background:radial-gradient(60% 40% at 50% 10%,rgba(99,102,241,.12),transparent 70%);
    }

    @media(max-width:480px){
      .btn-ghost{display:none}
      .cta-group{margin-top:2rem}
    }
  </style>
</head>
<body>

<div class="glow"></div>

<div class="hero">
  <div class="badge"><span class="badge-dot"></span> AI-Powered Finance</div>

  <h1 class="title">S.E.B.A</h1>

  <div class="sparkles-wrap">
    <div class="gl gl1"></div>
    <div class="gl gl2"></div>
    <div class="gl gl3"></div>
    <div class="gl gl4"></div>
    <canvas id="sparklesCanvas"></canvas>
    <div class="sparkles-mask"></div>
  </div>

  <p class="subtitle">Smart Expense Behaviour Analyser</p>

  <div class="cta-group">
    <a href="/login" class="btn-primary">Sign In &nbsp;→</a>
    <a href="/login?tab=signup" class="btn-ghost">Sign Up</a>
  </div>
</div>

<script>
/* ── Redirect if already logged in ─────────────────────── */
(function(){
  const s = localStorage.getItem('sebaUser');
  if (s) { try { JSON.parse(s); location.href = '/home'; } catch(e) { localStorage.removeItem('sebaUser'); } }
})();

/* ── Sparkles canvas (twinkling, high-density) ─────────── */
(function(){
  const canvas = document.getElementById('sparklesCanvas');
  const ctx    = canvas.getContext('2d');

  function resize(){
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COUNT = 1200;
  const pts   = [];

  function make(){
    return {
      x:  Math.random() * canvas.width,
      y:  Math.random() * canvas.height,
      r:  Math.random() * 0.6 + 0.4,       // 0.4–1 px
      op: Math.random(),                    // current opacity
      spd: Math.random() * 0.025 + 0.005,  // twinkle speed
      dir: Math.random() > 0.5 ? 1 : -1,   // fading in or out
    };
  }

  for (let i = 0; i < COUNT; i++) pts.push(make());

  function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pts.forEach(p => {
      p.op += p.spd * p.dir;
      if      (p.op >= 1)   { p.op = 1;   p.dir = -1; }
      else if (p.op <= 0.1) { p.op = 0.1; p.dir =  1; }
      ctx.fillStyle = `rgba(255,255,255,${p.op})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>
