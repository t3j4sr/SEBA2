<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S.E.B.A. – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#09090b;--zinc-900:rgba(24,24,27,.7);--zinc-800:#27272a;
      --zinc-700:#3f3f46;--zinc-600:#52525b;--zinc-400:#a1a1aa;
      --zinc-300:#d4d4d8;--zinc-200:#e4e4e7;--zinc-50:#fafafa;
      --accent:#6366f1;--accent-h:#4f46e5;
      --danger:#e03e5c;--success:#22c55e;
    }
    html,body{height:100%;overflow:hidden}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--zinc-50);position:relative}

    /* ── canvas / overlays ─────────────────────────────────────────── */
    #particles{position:fixed;inset:0;pointer-events:none;opacity:.5;mix-blend-mode:screen}
    .vignette{position:fixed;inset:0;pointer-events:none;background:radial-gradient(80% 60% at 50% 30%,rgba(255,255,255,.055),transparent 62%)}

    /* ── animated grid lines ──────────────────────────────────────── */
    .accent-lines{position:fixed;inset:0;pointer-events:none;opacity:.7}
    .hline,.vline{position:absolute;background:var(--zinc-800)}
    .hline{left:0;right:0;height:1px;transform:scaleX(0);transform-origin:50% 50%;animation:drawX .8s cubic-bezier(.22,.61,.36,1) forwards}
    .vline{top:0;bottom:0;width:1px;transform:scaleY(0);transform-origin:50% 0%;animation:drawY .9s cubic-bezier(.22,.61,.36,1) forwards}
    .hline:nth-child(1){top:18%;animation-delay:.12s}
    .hline:nth-child(2){top:50%;animation-delay:.22s}
    .hline:nth-child(3){top:82%;animation-delay:.32s}
    .vline:nth-child(4){left:20%;animation-delay:.42s}
    .vline:nth-child(5){left:50%;animation-delay:.54s}
    .vline:nth-child(6){left:80%;animation-delay:.66s}
    @keyframes drawX{0%{transform:scaleX(0);opacity:0}60%{opacity:.95}100%{transform:scaleX(1);opacity:.7}}
    @keyframes drawY{0%{transform:scaleY(0);opacity:0}60%{opacity:.95}100%{transform:scaleY(1);opacity:.7}}

    /* ── topbar ────────────────────────────────────────────────────── */
    header{
      position:fixed;top:0;left:0;right:0;z-index:20;
      display:flex;align-items:center;justify-content:space-between;
      padding:.9rem 1.8rem;
      border-bottom:1px solid rgba(39,39,42,.8);
      background:rgba(9,9,11,.6);backdrop-filter:blur(16px);
    }
    .brand{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--zinc-400)}
    .brand strong{color:var(--zinc-50)}

    /* ── centered layout ────────────────────────────────────────────── */
    .center{
      position:fixed;inset:0;display:grid;place-items:center;padding:1rem;
      z-index:10;
    }

    /* ── glassmorphism card ─────────────────────────────────────────── */
    .card{
      width:100%;max-width:380px;
      background:rgba(24,24,27,.65);
      border:1px solid rgba(63,63,70,.5);
      border-radius:20px;
      backdrop-filter:blur(28px);
      -webkit-backdrop-filter:blur(28px);
      box-shadow:0 24px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06);
      opacity:0;transform:translateY(22px);
      animation:fadeUp .75s cubic-bezier(.22,.61,.36,1) .3s forwards;
    }
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

    .card-header{padding:1.8rem 1.8rem 0}
    .card-title{font-size:1.45rem;font-weight:700;color:var(--zinc-50);margin-bottom:.3rem}
    .card-sub{font-size:.82rem;color:var(--zinc-400)}

    /* ── tabs ───────────────────────────────────────────────────────── */
    .tabs{display:flex;margin:1.3rem 1.8rem 0;background:rgba(9,9,11,.6);border:1px solid var(--zinc-800);border-radius:10px;padding:3px;gap:3px}
    .tab-btn{
      flex:1;padding:.5rem;border:none;border-radius:7px;
      font-family:inherit;font-size:.82rem;font-weight:500;cursor:pointer;
      background:transparent;color:var(--zinc-400);transition:all .2s;
    }
    .tab-btn.active{background:rgba(99,102,241,.18);color:var(--zinc-50);border:1px solid rgba(99,102,241,.3)}

    /* ── card body ──────────────────────────────────────────────────── */
    .card-body{padding:1.3rem 1.8rem 1.8rem;display:flex;flex-direction:column;gap:1rem}

    /* ── field ──────────────────────────────────────────────────────── */
    .field{display:flex;flex-direction:column;gap:.45rem}
    .field label{font-size:.78rem;font-weight:500;color:var(--zinc-300)}
    .input-wrap{position:relative;display:flex;align-items:center}
    .field-icon{position:absolute;left:.85rem;color:var(--zinc-600);pointer-events:none;font-size:1rem;line-height:1}
    .field input{
      width:100%;padding:.72rem 1rem .72rem 2.5rem;
      background:rgba(9,9,11,.7);border:1.5px solid var(--zinc-800);
      border-radius:10px;color:var(--zinc-50);font-size:.88rem;font-family:inherit;
      outline:none;transition:border-color .2s,box-shadow .2s;
    }
    .field input::placeholder{color:var(--zinc-700)}
    .field input:focus{border-color:rgba(99,102,241,.6);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
    .field input.has-toggle{padding-right:2.8rem}
    .toggle-pw{
      position:absolute;right:.65rem;background:none;border:none;cursor:pointer;
      color:var(--zinc-500);padding:.3rem;border-radius:5px;transition:color .15s;line-height:0;
    }
    .toggle-pw:hover{color:var(--zinc-200)}

    /* ── submit btn ────────────────────────────────────────────────── */
    .btn-submit{
      width:100%;padding:.8rem;border:none;border-radius:10px;
      background:var(--zinc-50);color:#09090b;
      font-family:inherit;font-size:.92rem;font-weight:600;
      cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.1px;
    }
    .btn-submit:hover{background:var(--zinc-200)}
    .btn-submit:active{transform:scale(.985)}
    .btn-submit:disabled{opacity:.45;cursor:not-allowed}

    /* ── error / success toast ──────────────────────────────────────── */
    .msg{
      font-size:.8rem;padding:.6rem .9rem;border-radius:8px;
      display:none;text-align:center;line-height:1.4;
    }
    .msg.err{background:rgba(224,62,92,.12);border:1px solid rgba(224,62,92,.3);color:#fca5a5;display:block}
    .msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;display:block}

    /* ── footer ─────────────────────────────────────────────────────── */
    .card-footer{
      padding:0 1.8rem 1.5rem;text-align:center;
      font-size:.8rem;color:var(--zinc-400);
    }
    .card-footer a{color:var(--zinc-200);cursor:pointer;text-decoration:none}
    .card-footer a:hover{text-decoration:underline}

    /* ── accent dots on card ────────────────────────────────────────── */
    .card-header-glow{
      position:absolute;top:-90px;right:-60px;width:220px;height:220px;
      border-radius:50%;background:rgba(99,102,241,.12);
      filter:blur(50px);pointer-events:none;
    }
    .card-wrap{position:relative}
  
    /* Universal Mobile Polish injected automatically */
    html, body { overflow-x: hidden; width: 100%; }
    * { word-wrap: break-word; } /* Prevent text overflow */
    @media(max-width: 768px){
        nav { padding: 0.8rem 1rem !important; flex-wrap: wrap; }
        .nav-links { gap: 0.3rem !important; }
        main { padding: 1.5rem 1rem 6rem !important; }
        .stats-row, .charts-grid, .grid2, .cards-grid, .tips-row, .emi-slider-row, .emi-grid, .cc-grid, .pred-grid { grid-template-columns: 1fr !important; }
        .chart-card.full, .card, .stat-card { grid-column: span 1 !important; width: 100% !important; margin: 0 auto !important; box-sizing: border-box !important;}
        .stat-card .value { font-size: 1.5rem !important; }
        .tx-item, .insight-card { flex-direction: column !important; align-items: flex-start !important; padding: 1rem !important;}
        .tx-icon, .insight-icon { margin-bottom: 0.5rem !important; }
        h1, h2 { font-size: 1.4rem !important; word-wrap: break-word; }
        .hero-title { font-size: 2rem !important; }
        .hero-desc { font-size: 0.9rem !important; width: 100% !important; }
        table { display: block; overflow-x: auto; white-space: nowrap; }
    }
    @media(max-width: 480px){
        .nav-link { padding: 0.3rem 0.5rem !important; font-size: 0.75rem !important; }
        .logo { font-size: 1rem !important; }
        input, select, button { width: 100% !important; box-sizing: border-box; }
        .card, .stat-card { padding: 1rem !important; overflow: hidden; }
        .chart-wrap { height: 180px !important; }
        .cc-visual { width: 100% !important; height: auto !important; aspect-ratio: 1.58; }
    }

</style>
</head>
<body>

<!-- Layers -->
<canvas id="particles"></canvas>
<div class="vignette"></div>
<div class="accent-lines">
  <div class="hline"></div>
  <div class="hline"></div>
  <div class="hline"></div>
  <div class="vline"></div>
  <div class="vline"></div>
  <div class="vline"></div>
</div>

<!-- Top bar -->
<header>
  <div class="brand"><strong>S.E.B.A.</strong> &nbsp;Smart Expense Behaviour Analyser</div>
</header>

<!-- Card -->
<div class="center">
  <div class="card-wrap">
    <div class="card-header-glow"></div>
    <div class="card">
      <div class="card-header">
        <div class="card-title" id="cardTitle">Welcome back</div>
        <div class="card-sub" id="cardSub">Sign in to your S.E.B.A. account</div>
      </div>

      <!-- Login / Signup tabs -->
      <div class="tabs">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
      </div>

      <div class="card-body">
        <!-- Message -->
        <div class="msg" id="msg"></div>

        <!-- Username -->
        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="field-icon">👤</span>
            <input id="username" type="text" placeholder="yourname" autocomplete="username" spellcheck="false"/>
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="field-icon">🔒</span>
            <input id="password" type="password" placeholder="••••••••" class="has-toggle" autocomplete="current-password"
              onkeydown="if(event.key==='Enter') submit()"/>
            <button class="toggle-pw" onclick="togglePw()" type="button" title="Show / hide password">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm Password (signup only) -->
        <div class="field" id="confirmWrap" style="display:none">
          <label for="confirm">Confirm Password</label>
          <div class="input-wrap">
            <span class="field-icon">🔒</span>
            <input id="confirm" type="password" placeholder="••••••••" class="has-toggle"
              onkeydown="if(event.key==='Enter') submit()"/>
          </div>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="submit()">Sign In</button>
      </div>

      <div class="card-footer" id="footerTxt">
        Don't have an account? <a onclick="switchTab('signup')">Create one</a>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Particles ─────────────────────────────────────────────────────── */
(function(){
  const c=document.getElementById('particles'), ctx=c.getContext('2d');
  function sz(){c.width=innerWidth;c.height=innerHeight}
  sz();
  let ps=[], raf;
  const mk=()=>({x:Math.random()*c.width,y:Math.random()*c.height,v:Math.random()*.25+.05,o:Math.random()*.35+.15});
  function init(){ps=[];const n=Math.floor(c.width*c.height/9000);for(let i=0;i<n;i++)ps.push(mk());}
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ps.forEach(p=>{
      p.y-=p.v;
      if(p.y<0){p.x=Math.random()*c.width;p.y=c.height+20;p.v=Math.random()*.25+.05;p.o=Math.random()*.35+.15;}
      ctx.fillStyle=`rgba(250,250,250,${p.o})`;ctx.fillRect(p.x,p.y,.7,2.2);
    });
    raf=requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{sz();init();});
  init();draw();
})();

/* ── State ──────────────────────────────────────────────────────────── */
let mode='login'; // 'login' | 'signup'

function switchTab(t){
  mode=t;
  const isLogin=(t==='login');
  document.getElementById('tabLogin').classList.toggle('active',isLogin);
  document.getElementById('tabSignup').classList.toggle('active',!isLogin);
  document.getElementById('cardTitle').textContent=isLogin?'Welcome back':'Create account';
  document.getElementById('cardSub').textContent=isLogin?'Sign in to your S.E.B.A. account':'Start tracking your finances today';
  document.getElementById('submitBtn').textContent=isLogin?'Sign In →':'Create Account →';
  document.getElementById('confirmWrap').style.display=isLogin?'none':'flex';
  document.getElementById('footerTxt').innerHTML=isLogin
    ?'Don\'t have an account? <a onclick="switchTab(\'signup\')">Create one</a>'
    :'Already have an account? <a onclick="switchTab(\'login\')">Sign in</a>';
  clearMsg();
  document.getElementById('username').focus();
}

/* ── Eye toggle ─────────────────────────────────────────────────────── */
function togglePw(){
  const inp=document.getElementById('password');
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  document.getElementById('eyeIcon').innerHTML=show
    ?'<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

/* ── Msg helpers ─────────────────────────────────────────────────────── */
function showMsg(txt,type){
  const el=document.getElementById('msg');
  el.textContent=txt;el.className='msg '+type;
}
function clearMsg(){document.getElementById('msg').className='msg';}

/* ── Submit ─────────────────────────────────────────────────────────── */
async function submit(){
  const username=document.getElementById('username').value.trim().toLowerCase();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('submitBtn');
  clearMsg();

  if(!username){showMsg('Please enter a username.','err');return;}
  if(password.length<6){showMsg('Password must be at least 6 characters.','err');return;}
  if(mode==='signup'){
    const confirm=document.getElementById('confirm').value;
    if(password!==confirm){showMsg('Passwords do not match.','err');return;}
  }

  btn.disabled=true;btn.textContent='Please wait…';

  try{
    const endpoint=mode==='login'?'/auth/login':'/auth/signup';
    const res=await fetch(endpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });
    const data=await res.json();

    if(!res.ok){
      showMsg(data.detail||'Something went wrong.','err');
      return;
    }

    // Store session
    localStorage.setItem('sebaUser',JSON.stringify({user_id:data.user_id,username:data.username}));

    // Redirect to welcome splash
    location.href='/welcome';

  }catch(e){
    showMsg('Network error — is the server running?','err');
  }finally{
    btn.disabled=false;
    btn.textContent=mode==='login'?'Sign In →':'Create Account →';
  }
}

/* ── Check already logged in + tab param ───────────────────────────── */
(function(){
  const s=localStorage.getItem('sebaUser');
  if(s){try{JSON.parse(s);location.href='/home';}catch(e){localStorage.removeItem('sebaUser');}}
  const tab=new URLSearchParams(location.search).get('tab');
  if(tab==='signup') switchTab('signup');
})();
</script>
</body>
</html>
