version: "1"
services:
  - type: web
    name: seba-backend
    env: python
    rootDir: SEBA
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: seba-frontend-react
    env: static
    rootDir: SEBA-Fro
    buildCommand: "npm install && npm run build"
    publishPath: "dist"
