<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.E.B.A. - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --secondary: #6366f1;
      --bg-dark: #09090b;
      --card-bg: rgba(14, 14, 17, 0.7);
      --glass-border: rgba(255, 255, 255, 0.05);
      --text: #fafafa;
      --text-muted: #a1a1aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      background-image: radial-gradient(ellipse at top center, rgba(79, 70, 229, 0.15) 0%, transparent 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 20px;
    }

    .glass-panel {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 40px 50px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      animation: fadeIn 0.6s ease-out;
      width: 100%;
      max-width: 450px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .title-wrapper { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    h1 {
      font-weight: 600;
      font-size: 3rem;
      background: linear-gradient(135deg, white, #a1a1aa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      letter-spacing: -0.5px;
    }

    p.subtitle { font-size: 1rem; color: var(--text-muted); }

    .form-container { width: 100%; display: flex; flex-direction: column; gap: 15px; }

    input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
    }
    
    input::placeholder { color: var(--text-muted); }
    input:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
    }

    .action-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      margin-top: 10px;
    }

    .login-btn {
      width: 100%;
      padding: 14px 30px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: var(--primary);
      color: white;
      font-family: inherit;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s ease;
      display: block;
    }

    .login-btn:hover {
      background: var(--secondary);
    }

    .signup-link { color: var(--text-muted); font-size: 0.95rem; }
    .signup-link a { color: var(--primary); text-decoration: none; font-weight: 500; transition: color 0.2s ease; }
    .signup-link a:hover { color: var(--text); }

    #errorPopup {
      position: fixed;
      top: 20px; right: 20px;
      background: rgba(239,68,68,0.9);
      backdrop-filter: blur(10px);
      color: white;
      padding: 15px 25px;
      border-radius: 12px;
      display: none;
      align-items: center;
      gap: 10px;
      z-index: 100000;
      box-shadow: 0 5px 15px rgba(239,68,68,0.3);
      font-weight: 500;
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @media (max-width: 600px) {
      h1 { font-size: 3.5rem; }
      .glass-panel { padding: 40px 30px; }
      #errorPopup { top: 10px; right: 10px; left: 10px; justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="react-auth-root"></div>
  <script type="module" src="/src/login-main.tsx"></script>
</body>
</html>
