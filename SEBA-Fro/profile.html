<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.E.B.A. - Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --secondary: #6366f1;
      --bg-dark: #09090b;
      --card-bg: rgba(14, 14, 17, 0.7);
      --glass-border: rgba(255, 255, 255, 0.05);
      --text: #fafafa;
      --text-muted: #a1a1aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      background-image: radial-gradient(ellipse at top center, rgba(79, 70, 229, 0.15) 0%, transparent 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 20px;
    }

    .glass-panel {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 40px 50px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.6s ease-out;
      width: 100%;
      max-width: 650px;
      z-index: 10;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 20px;
      margin-bottom: 30px;
    }

    .header-row h2 {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(135deg, white, #a1a1aa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .back-link:hover { color: var(--text); }

    .identity-row {
      display: flex;
      align-items: center;
      gap: 25px;
      margin-bottom: 35px;
    }

    .large-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      font-size: 2rem;
      letter-spacing: 1px;
    }

    .identity-info h3 { font-size: 1.6rem; font-weight: 500; margin-bottom: 5px; }
    .identity-info p { color: var(--text-muted); font-size: 1rem; }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .detail-box {
      background: rgba(255, 255, 255, 0.02);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: background 0.3s ease;
    }

    .detail-box:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .detail-box label {
      display: block;
      color: var(--primary);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .detail-box .value { font-size: 1.2rem; font-weight: 500; }

    .logout-all-btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      font-family: inherit;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 0.2s ease;
      display: block;
      margin-top: 35px;
    }

    .logout-all-btn:hover {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
    }

    @media (max-width: 600px) {
      .details-grid { grid-template-columns: 1fr; }
      .glass-panel { padding: 30px; overflow-y: auto; max-height: 95vh; }
      .identity-row { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>


  <div class="react-particles-root"></div>
  <script type="module" src="/src/background.tsx"></script>

  <div class="glass-panel">
    <div class="header-row">
      <h2>My Profile</h2>
      <a href="index.html" class="back-link">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Dashboard
      </a>
    </div>

    <div class="identity-row">
      <div class="large-avatar" id="profAvatar">YS</div>
      <div class="identity-info">
        <h3 id="profName">Yashas S</h3>
        <p id="profEmail">yashas@example.com</p>
      </div>
    </div>

    <div class="details-grid">
      <div class="detail-box">
        <label>Mobile Number</label>
        <div class="value" id="profMobile">+91 98765 43210</div>
      </div>
      <div class="detail-box">
        <label>Date of Birth</label>
        <div class="value" id="profDob">01 Jan 2000</div>
      </div>
      <div class="detail-box">
        <label>Currency</label>
        <div class="value" id="profCurrency">₹ INR</div>
      </div>
      <div class="detail-box">
        <label>Budget Target</label>
        <div class="value" id="profBudget">₹ 50,000</div>
      </div>
    </div>

    <a href="login.html" class="logout-all-btn" onclick="localStorage.removeItem('seba_user_data'); localStorage.removeItem('seba_user_name');">Log out & Clear Data</a>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const savedDataStr = localStorage.getItem('seba_user_data');
      if (savedDataStr) {
        const d = JSON.parse(savedDataStr);
        document.getElementById('profName').innerText = d.name || 'User';
        document.getElementById('profEmail').innerText = d.email || 'user@example.com';
        document.getElementById('profMobile').innerText = d.mobile || '-';
        document.getElementById('profDob').innerText = d.dob || '-';
        
        let currMap = { '₹': '₹ INR', '$': '$ USD', '€': '€ EUR' };
        document.getElementById('profCurrency').innerText = currMap[d.currency] || d.currency || '₹ INR';
        
        if (d.budget && d.currency) {
          let formattedBudget = new Intl.NumberFormat().format(d.budget);
          document.getElementById('profBudget').innerText = d.currency + " " + formattedBudget;
        } else {
          document.getElementById('profBudget').innerText = '-';
        }

        const initials = d.name ? d.name.split(' ').map(n => n.charAt(0)).join('').substring(0, 2).toUpperCase() : 'U';
        document.getElementById('profAvatar').innerText = initials || 'U';
      }
    });
  </script>
</body>
</html>
