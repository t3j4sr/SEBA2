<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.E.B.A Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --secondary: #6366f1;
      --bg-dark: #09090b;
      --card-bg: rgba(14, 14, 17, 0.7);
      --glass-border: rgba(255, 255, 255, 0.05);
      --text: #fafafa;
      --text-muted: #a1a1aa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      background-image: radial-gradient(ellipse at top center, rgba(79, 70, 229, 0.15) 0%, transparent 60%);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      margin-bottom: 50px;
      font-weight: 600;
      font-size: 2.5rem;
      background: linear-gradient(135deg, white, #a1a1aa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .container {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .input-panel h3 {
      font-weight: 500;
      margin-bottom: 20px;
      color: var(--text);
      font-size: 1.25rem;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      appearance: none;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
    }

    select option {
      background: var(--bg-dark);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: var(--primary);
      color: white;
      font-family: inherit;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
    }

    button:hover {
      background: var(--secondary);
    }

    button.demo {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
    }

    button.demo:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    .dashboard-panel {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      margin-top: 4px;
    }

    .transactions-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-height: 500px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .transactions-list::-webkit-scrollbar {
      width: 5px;
    }

    .transactions-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 5px;
    }

    .transaction-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      padding: 12px 18px;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    .transaction-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .t-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .t-title {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .t-category {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .t-amount {
      font-weight: 600;
      font-size: 1.2rem;
    }

    .t-amount.income {
      color: #10b981;
    }

    .t-amount.expense {
      color: #ef4444;
    }

    .profile-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: 1px solid var(--glass-border);
      padding: 6px 12px 6px 6px;
      border-radius: 50px;
    }

    .profile-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      font-size: 1rem;
    }

    .profile-info {
      text-align: left;
      line-height: 1.2;
    }

    .profile-name {
      font-weight: 500;
      font-size: 0.9rem;
    }

    .profile-email {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .profile-logout {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.85rem;
      margin-left: 5px;
      transition: color 0.3s ease;
    }

    .profile-logout:hover {
      color: #ef4444;
    }

    /* Welcome Overlay */
    #welcomeOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg-dark);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .anim-zoom-fade {
      animation: zoomInFadeOut 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes zoomInFadeOut {
      0% {
        transform: scale(0.85);
        opacity: 0;
        filter: blur(8px);
      }

      20% {
        transform: scale(1);
        opacity: 1;
        filter: blur(0px);
      }

      80% {
        transform: scale(1);
        opacity: 1;
        filter: blur(0px);
      }

      100% {
        transform: scale(1.2);
        opacity: 0;
        filter: blur(4px);
      }
    }

    @media (max-width: 1024px) {
      .container {
        grid-template-columns: 1fr;
      }

      .profile-card {
        position: relative;
        justify-content: center;
        margin-top: 15px;
        margin-bottom: 25px;
      }
    }
  </style>
</head>

<body>

  <!-- Welcome Overlay -->
  <div id="welcomeOverlay">
    <div id="welcomeTextWrap" style="text-align: center; opacity: 0;">
      <h1 id="welcomeGreeting" style="font-size: 4.5rem; margin-bottom: 10px; line-height: 1.1;">Welcome</h1>
      <h2 style="font-size: 1.5rem; color: var(--text-muted); font-weight: 300;">Setting up your dashboard...</h2>
    </div>
  </div>

  <script>
    // Profile Data Loading
    document.addEventListener('DOMContentLoaded', () => {
      const savedDataStr = localStorage.getItem('seba_user_data');
      if (savedDataStr) {
        const d = JSON.parse(savedDataStr);
        if (document.getElementById('dashName')) document.getElementById('dashName').innerText = d.name || 'User';
        if (document.getElementById('dashEmail')) document.getElementById('dashEmail').innerText = d.email || 'user@example.com';
        if (d.name && document.getElementById('dashAvatar')) {
          const initials = d.name.split(' ').map(n => n.charAt(0)).join('').substring(0, 2).toUpperCase();
          document.getElementById('dashAvatar').innerText = initials || 'U';
        }
      }
    });

    if (localStorage.getItem('animate_welcome') === 'true') {
      const overlay = document.getElementById('welcomeOverlay');
      const textWrap = document.getElementById('welcomeTextWrap');
      const greeting = document.getElementById('welcomeGreeting');

      let userName = localStorage.getItem('seba_user_name') || 'User';
      userName = userName.charAt(0).toUpperCase() + userName.slice(1);

      greeting.innerHTML = `Welcome,<br><span style="color: white; font-weight: 500;">${userName}</span>`;

      setTimeout(() => { textWrap.classList.add('anim-zoom-fade'); }, 100);
      setTimeout(() => { overlay.style.opacity = '0'; overlay.style.visibility = 'hidden'; localStorage.removeItem('animate_welcome'); }, 2600);
    } else {
      document.getElementById('welcomeOverlay').style.display = 'none';
    }
  </script>

  <div class="react-particles-root"></div>
  <script type="module" src="/src/background.tsx"></script>

  <nav style="display: flex; align-items: center; justify-content: space-between; padding: 1rem 2.5rem; border-bottom: 1px solid var(--glass-border); background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50;">
    <div style="display: flex; flex-direction: column; gap: 2px;">
      <div style="font-size: 1.25rem; font-weight: 700; color: white;">S.E.B.A. <span style="font-size: 1.1rem;">💬</span></div>
      <div style="font-size: 0.72rem; color: var(--text-muted); font-weight: 400; letter-spacing: 0.3px;">Smart Expense Behaviour Analyser</div>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <a href="/predictions" style="background: rgba(40, 40, 45, 0.6); border: 1px solid var(--glass-border); color: #e2e8f0; padding: 6px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: all 0.2s;">
        <span style="font-size: 0.9rem;">🔮</span> Predictions
      </a>
      <a href="/analytics.html" style="background: rgba(40, 40, 45, 0.6); border: 1px solid var(--glass-border); color: #e2e8f0; padding: 6px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: all 0.2s;">
        <span style="font-size: 0.9rem;">📊</span> Analytics
      </a>
      <div id="react-notification-root" style="margin-left: 8px;"></div>
      <a href="profile.html" style="margin-left: 10px; display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit;">
        <div class="profile-avatar" id="dashAvatar" style="width: 32px; height: 32px; font-size: 0.9rem;">U</div>
      </a>
    </div>
  </nav>

  <!-- Vite module script -->
  <script type="module" src="/src/main.tsx"></script>

  <div class="container" style="display: flex; flex-direction: column; gap: 40px; padding-top: 40px; align-items: center;">

    <!-- Dashboard Main Column -->
    <div class="dashboard-panel" style="width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 24px;">
      
      <!-- Key Stats Container -->
      <div id="react-dashboard-overview-root" style="margin-bottom: 8px;"></div>

      <!-- Explore Features Container -->
      <div id="react-dashboard-features-root" style="margin-bottom: 12px;"></div>

      <!-- Input Card (Redesigned with Tabs) -->
      <div class="glass" style="padding: 0; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.08); margin-bottom: 12px;">
        <div style="display: flex; background: rgba(15, 15, 20, 0.4); border-bottom: 1px solid var(--glass-border);">
          <button id="btnManual" onclick="switchInputTab('manual')" style="flex: 1; margin: 0; border: none; background: #6366f1; border-radius: 0; padding: 14px; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <span style="font-size: 1rem;">✏️</span> Manual Entry
          </button>
          <button id="btnUpload" onclick="switchInputTab('upload')" style="flex: 1; margin: 0; border: none; background: transparent; border-radius: 0; color: var(--text-muted); padding: 14px; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <span style="font-size: 1rem;">📄</span> Upload Statement
          </button>
        </div>

        <div id="manualPane" style="padding: 30px;">
          <div class="form-group" style="margin-bottom: 24px;">
            <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500;">Description</label>
            <input type="text" id="desc" placeholder="e.g. Swiggy dinner, Metro pass..." style="background: rgba(10, 10, 15, 0.6); padding: 14px;">
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
            <div class="form-group">
              <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500;">Amount (₹)</label>
              <input type="number" id="amount" placeholder="250" style="background: rgba(10, 10, 15, 0.6); padding: 14px;">
            </div>
            <div class="form-group">
              <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500;">Date</label>
              <input type="date" id="date" style="background: rgba(10, 10, 15, 0.6); padding: 14px;">
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 30px;">
            <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500;">Time <span style="font-size: 0.75rem; color: rgba(255,255,255,0.2)">(optional)</span></label>
            <input type="time" id="time" style="background: rgba(10, 10, 15, 0.6); padding: 14px;">
          </div>

          <button onclick="addTransaction()" style="width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; letter-spacing: 0.5px; background: #6366f1;">Add Expense →</button>
        </div>

        <div id="uploadPane" style="padding: 40px; display: none; text-align: center;">
          <div style="border: 2px dashed var(--glass-border); border-radius: 12px; padding: 40px; color: var(--text-muted); cursor: pointer;" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--glass-border)'">
            <span style="font-size: 2rem; display: block; margin-bottom: 10px;">📂</span>
            Click to upload a bank statement
            <div style="font-size: 0.75rem; margin-top: 8px; opacity: 0.6;">Supports .csv and .pdf</div>
          </div>
          <button style="margin-top: 24px; background: var(--primary); opacity: 0.5; cursor: not-allowed;" disabled>Upload & Analyse →</button>
        </div>
      </div>

      <!-- Recent Transactions List -->
      <div class="glass" style="background: rgba(14, 14, 17, 0.4); border: 1px solid rgba(255, 255, 255, 0.05);">
        <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 20px;">
          <h3 style="font-weight: 500; font-size: 1.1rem; margin: 0; color: #fff;">Recent Transactions</h3>
          <a href="analytics.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 500; transition: color 0.2s;">View Analytics →</a>
        </div>
        <div class="transactions-list" id="transactionsList" style="display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto;">
          <p style="color: var(--text-muted); text-align: center; padding: 20px;">No transactions yet. Add one to see it here.</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    let txData = [];

    // Optional user currency load
    let currentCurrency = '₹';
    document.addEventListener('DOMContentLoaded', () => {
      const savedDataStr = localStorage.getItem('seba_user_data');
      if (savedDataStr) {
        const d = JSON.parse(savedDataStr);
        if (d.currency) currentCurrency = d.currency;
        document.getElementById('amount').placeholder = `250`;
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      }

      const savedTx = localStorage.getItem('seba_transactions');
      if (savedTx) {
        txData = JSON.parse(savedTx);
        updateViews();
      }
    });

    function switchInputTab(tab) {
      const isManual = tab === 'manual';
      document.getElementById('manualPane').style.display = isManual ? 'block' : 'none';
      document.getElementById('uploadPane').style.display = isManual ? 'none' : 'block';
      
      const btnManual = document.getElementById('btnManual');
      const btnUpload = document.getElementById('btnUpload');
      
      if (isManual) {
        btnManual.style.background = '#6366f1';
        btnManual.style.color = 'white';
        btnUpload.style.background = 'transparent';
        btnUpload.style.color = 'var(--text-muted)';
      } else {
        btnManual.style.background = 'transparent';
        btnManual.style.color = 'var(--text-muted)';
        btnUpload.style.background = '#6366f1';
        btnUpload.style.color = 'white';
      }
    }

    function addTransaction() {
      let desc = document.getElementById("desc").value;
      let amount = document.getElementById("amount").value;
      let date = document.getElementById("date").value;
      let time = document.getElementById("time").value;

      if (!amount || !desc) {
        alert("Please fill in the description and amount.");
        return;
      }

      txData.push({ type: 'expense', amount: parseInt(amount), category: 'Shopping', time, date: date || new Date().toISOString().split('T')[0], desc });
      localStorage.setItem('seba_transactions', JSON.stringify(txData));
      window.dispatchEvent(new Event('seba-transactions-updated'));

      // Reset inputs
      document.getElementById("amount").value = "";
      document.getElementById("desc").value = "";
      document.getElementById("time").value = "";

      updateViews();
    }

    function updateViews() {
      if (txData.length === 0) return;

      let income = 0;
      let spent = 0;
      let listHTML = "";

      for (let i = txData.length - 1; i >= 0; i--) {
        const tx = txData[i];
        if (tx.type === 'income') { income += tx.amount; }
        else { spent += tx.amount; }

        let sign = tx.type === 'income' ? '+' : '-';
        let colorClass = tx.type === 'income' ? 'income' : 'expense';
        let title = tx.desc ? tx.desc : tx.category;

        listHTML += `
          <div class="transaction-item">
            <div class="t-info">
              <div class="t-title">${title}</div>
              <div class="t-category">${tx.category} • ${tx.time}</div>
            </div>
            <div class="t-amount ${colorClass}">${sign}${currentCurrency}${tx.amount.toLocaleString()}</div>
          </div>
        `;
      }

      document.getElementById("transactionsList").innerHTML = listHTML;
    }
  </script>
</body>

</html>
